# ─────────────────────────────────────────────
#  Global configuration — no hardcoded values
#  in any other file. All paths are relative to
#  the project root.
# ─────────────────────────────────────────────

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  results_figures: "results/figures"
  results_tables: "results/tables"

random_seed: 42

# ── Dataset ──────────────────────────────────
datasets:
  directory: "class_imbalance/class_imbalance"
  # Minimum imbalance ratio to keep a dataset (minority / majority)
  min_imbalance_ratio: 0.0
  # Maximum number of samples (skip very large datasets)
  max_samples: 50000
  # Datasets to skip entirely (e.g. too many features → prohibitive runtime)
  exclude:
    - dataset_1039_hiva_agnostic
  target_column: "binaryClass"  # fallback: last column used if not found

# ── Cross-validation ─────────────────────────
# quick_run: true  →  fast results for checkpoint / development
#            false →  full repeated k-fold for final submission
quick_run: false

evaluation:
  cv_folds: 10         # full: 10
  cv_strategy: "stratified"       # stratified | regular
  n_repetitions: 1                # full: 5
  test_size: 0.2                  # only used when strategy == holdout
  scoring:
    - "f1"
    - "roc_auc"
    - "balanced_accuracy"
    - "geometric_mean"            # custom metric in src/evaluation/metrics.py

# ── KNN baseline ─────────────────────────────
knn_base:
  k_range: [1, 3, 5, 7, 9, 11, 15, 21]

# ── KNN optimal-k (inner CV selection) ───────
knn_opt_k:
  # k_range is derived automatically at fit time: odd values 1..sqrt(n_train)
  # k_max caps the search for large datasets (null = use sqrt(n_train), no cap)
  k_max: null
  inner_cv_folds: 3   # kept at 3 to limit overhead inside the outer CV loop
  n_jobs: 8           # inner CV parallelism; reduce when outer benchmark N_JOBS > 1
  distance_metric: "euclidean"    # euclidean | manhattan | minkowski
  weights: "uniform"              # uniform | distance

# ── KNN adaptive-k (entropy) ─────────────────
knn_adaptive_entropy:
  k_min: 1                        # smallest k (must be odd; floored to odd if even)
  k_max: null                     # null → use floor(sqrt(n_train)) at fit time
  entropy_smoothing: 1.0e-9
  distance_metric: "euclidean"

# ── KNN adaptive-k (eigenvalues) ─────────────
knn_adaptive_eigen:
  k_min: 1                        # smallest k (must be odd; floored to odd if even)
  k_max: null                     # null → use floor(sqrt(n_train)) at fit time
  n_components: null              # null → keep all; int → PCA dims
  eigen_threshold: 0.95           # cumulative variance to retain
  distance_metric: "euclidean"

# ── KNN adaptive-k (topology / persistent homology) ──
knn_adaptive_topo:
  k_min: 1                        # k used in minority/boundary/outlier cases
  k_max: null                     # null → floor(sqrt(n_train)) at fit time
  h0_threshold: 0.5               # H0 max persistence / diameter above which sub-clusters detected
  h1_threshold: 0.1               # H1 total persistence / diameter above which boundary detected
  minority_threshold: 0.15        # label fraction below which neighbourhood is majority-dominated

# ── KNN adaptive-k (dual class-anchor) ───────
knn_adaptive_dual_anchor:
  k_min: 1                        # k used when x fits minority structure
  k_max: null                     # null → floor(sqrt(n_train)) at fit time
  k_min_proba: 3                  # minimum k for predict_proba (avoids binary 0/1 output)

# ── KNN fair-rank (order-statistics correction) ──
knn_fair_rank:
  k_min: 10                       # nearest minority neighbours fetched (for upper bound on votes)
  k_maj_buffer: 10                # added when sizing majority neighbourhood
  k_maj_floor: 30                 # lower bound on majority neighbourhood (for small r)
  k_maj_cap: 1000                 # upper bound (raised so n_votes*r is reachable at severe imbalance)
  n_votes: 5                      # rank-corrected comparisons aggregated into each prediction

# ── KNN fair-rank CV (calibrated exponent k_eff = round(r^α)) ──
knn_fair_rank_cv:
  alpha_grid: [0.25, 0.5, 0.75, 1.0]   # α candidates; inner CV selects one per dataset
  inner_cv_folds: 3                    # folds used to choose α (matches knn_opt_k style)
  scoring: "geometric_mean"              # combined | mcc | geometric_mean | balanced_accuracy | f1

# ── KNN fair-rank LID (α derived from local intrinsic dimensionality) ──
knn_fair_rank_lid:
  alpha_min: 0.0           # lower bound on α (0 = allow full fall-back to no correction)
  scale: 0.75              # sensitivity: α = 1 - scale * CV_LID
  lid_sample_size: 200     # training points used for LID estimation
  lid_k: 10                # neighbours per point in Levina-Bickel MLE

# ── KNN fair-rank density (Modification E, rank-native) ──
# Per-query k_eff(x) from a minority-budget local density (count maj within the
# radius enclosing k_target minorities), Bayesian-shrunk toward v3's global r
# with relative prior weight `shrinkage`. λ = 0 → pure local; λ = 1 → 50/50;
# large λ → recovers v3.
knn_fair_rank_density:
  k_target: 50                   # minority budget for the local density estimate
  shrinkage: 1.0                 # prior weight λ pulling k_eff(x) toward global r

# ── KNN fair-rank joint CV (n_votes and α selected jointly by inner CV) ──
knn_fair_rank_joint_cv:
  n_votes_grid: [1, 2, 3, 5, 7, 10]   # same as opt-votes
  alpha_grid: [0.25, 0.5, 0.75, 1.0]  # same as fair-rank-cv
  inner_cv_folds: 3
  scoring: "geometric_mean"

# ── KNN fair-rank opt-votes (n_votes selected by inner CV) ──
knn_fair_rank_opt_votes:
  n_votes_grid: [1, 2, 3, 5, 7, 10]   # candidates; inner CV selects one per dataset
  inner_cv_folds: 3                    # matches knn_fair_rank_cv style
  scoring: "geometric_mean"            # geometric_mean | mcc | balanced_accuracy | f1 | combined

# ── KNN fair-rank ensemble (α grid voting, binary) ──
knn_fair_rank_ensemble:
  alpha_grid: [0.25, 0.5, 0.75, 1.0]   # same grid as knn_fair_rank_cv; all values vote

# ── KNN fair-rank magnitude ensemble (α grid voting, magnitude scores) ──
knn_fair_rank_magnitude_ensemble:
  alpha_grid: [0.25, 0.5, 0.75, 1.0]

# ── KNN fair-rank jackknife (LOO over minority ranks) ──
knn_fair_rank_jackknife:
  k_probe: null   # null → uses n_votes (exclude each active vote participant once)

# ── KNN fair-rank local odds (rank-native per-query k_eff) ──
knn_fair_rank_local_odds:
  k_probe: null    # null → uses k_min (all fetched minority distances contribute)
  shrinkage: 1.0   # prior weight λ; large λ → recovers v3

# ── DANN (baseline) ──────────────────────────
dann:
  sigma: 1.0                      # neighbourhood size σ
  k_range: [1, 3, 5, 7, 9, 11, 15, 21]

# ── DANN adaptive-k ──────────────────────────
dann_adaptive:
  sigma: 1.0
  k_min: 1                        # smallest k (floored to odd if even)
  k_max: null                     # null → use floor(sqrt(n_train)) at fit time
  adaptation_strategy: "entropy"  # entropy | eigen

# ── SMOTE baseline ───────────────────────────
smote:
  k_neighbors: 5
  sampling_strategy: "auto"

# ── Statistical tests ────────────────────────
statistical_tests:
  alpha: 0.05
  correction: "holm"              # holm | bonferroni | fdr_bh
  test: "wilcoxon"                # wilcoxon | friedman
